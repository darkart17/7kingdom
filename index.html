<!DOCTYPE html>
<html lang="ko">
<head>

<!-- 배틀 전용 오버레이 (퍼즐 RPG를 iframe으로 띄움)
     NOTE: `#game-container`는 transform(scale)을 사용하므로, 오버레이를 그 안에 두면
     fixed 포지션이 "전체 화면"이 아니라 "스케일된 컨테이너" 기준으로 동작할 수 있어
     반드시 body 직속으로 둡니다. -->
<div id="battle-overlay" style="display: none;">
    <iframe id="battle-frame" src="about:blank" frameborder="0"></iframe>
    <div id="quit-confirm-modal" class="quit-confirm-overlay hidden">
        <div class="quit-confirm-box">
            <div class="quit-confirm-text">던전을 포기하고 입구로 돌아갑니다.<br>얻은 골드는 사라집니다.</div>
            <div class="quit-confirm-btns">
                <button id="quit-confirm-cancel" class="quit-confirm-btn cancel">취소</button>
                <button id="quit-confirm-ok" class="quit-confirm-btn ok">확인</button>
</div>
        </div>
    </div>

<!-- 포기하기 등 메뉴 복귀 시 페이드 아웃 -->
<div id="fade-out-overlay"></div>

<script type="module">
    document.body.addEventListener('touchstart', () => {}, { passive: true });
    document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

    import { characterList } from './data/characters.js';
    import { memoryData } from './data/memory.js';
    import { lilyData } from './data/lily.js';
    import { lilyGoddessGiftData } from './data/lilyGoddessGift.js';
    import { goldDungeonFirstIntro, goldDungeonNoGuildIntro } from './data/goldDungeonIntro.js';
    import { shopIntroData } from './data/shopIntro.js';
    import { goldShopIntroData } from './data/goldShopIntro.js';
    import { guildIntroData } from './data/guildIntro.js';
    import { GUILD_CONFIG } from './data/guildConfig.js';
    import { GUILD_BOSS_REPORTS } from './data/guildBossReports.js';
    import { GameEngine } from './engine.js';
    import { shopItems, SHOP_CONFIG, goldShopItems, GOLD_SHOP_CONFIG } from './data/shop.js';

    // 블록 아이콘: 배틀 전용 에셋과 동일 경로 사용 (src/battle/assets/blocks/)
    const BLOCK_IMG_BASE = 'src/battle/assets/blocks/';
    const VAULT_BLOCKS = [
        { id: 'SWORD', imgPrefix: 'sword' },
        { id: 'POTION', imgPrefix: 'potion' },
        { id: 'SHIELD', imgPrefix: 'shield' },
        { id: 'MAGIC', imgPrefix: 'magic' },
    ];

    function addGoldDirect(amount) {
        try {
            const KEY = '3x3_vault';
            const s = localStorage.getItem(KEY);
            const parsed = s ? JSON.parse(s) : {};
            parsed.goldEarned = (Number(parsed.goldEarned) || 0) + (Number(amount) || 0);
            parsed.goldUsed = Number(parsed.goldUsed) || 0;
            parsed.blockLevels = parsed.blockLevels || { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 };
            parsed.playerMaxHp = Math.max(5, Number(parsed.playerMaxHp) || 10);
            parsed.heartPurchaseCount = Number(parsed.heartPurchaseCount) || 0;
            localStorage.setItem(KEY, JSON.stringify(parsed));
        } catch (e) {}
    }
    window.addGoldDirect = addGoldDirect;
    function getVaultState() {
        try {
            const KEY = '3x3_vault';
            const s = localStorage.getItem(KEY);
            if (!s) return { goldEarned: 0, goldUsed: 0, blockLevels: { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 }, playerMaxHp: 10, heartPurchaseCount: 0 };
            const p = JSON.parse(s);
            return {
                goldEarned: Number(p.goldEarned) || 0,
                goldUsed: Number(p.goldUsed) || 0,
                blockLevels: p.blockLevels || { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 },
                playerMaxHp: Math.max(5, Number(p.playerMaxHp) || 10),
                heartPurchaseCount: Number(p.heartPurchaseCount) || 0
            };
        } catch (e) { return { goldEarned: 0, goldUsed: 0, blockLevels: { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 }, playerMaxHp: 10, heartPurchaseCount: 0 }; }
    }
    function updateVaultBar() {
        try {
            const items = (window.SHOP_ITEMS || shopItems || VAULT_BLOCKS).filter((it) => it.id !== 'HEART');
            const state = (window.gameStorage && window.gameStorage.getState()) || getVaultState();
            const gold = Math.max(0, (state.goldEarned || 0) - (state.goldUsed || 0));
            const hp = Math.max(5, state.playerMaxHp || 10);
            const heartItem = `<div class="vault-item"><span class="vault-item-icon">❤️</span><span class="vault-item-val">${hp}</span></div>`;
            const goldItem = `<div class="vault-item"><img class="vault-item-icon" src="assets/images/main/coin.png" alt="골드"><span class="vault-item-val">${gold}</span></div>`;
            const blocksHtml = items.map((it) => {
                const lv = (state.blockLevels && state.blockLevels[it.id]) ?? 1;
                const prefix = it.imgPrefix || it.id.toLowerCase();
                const imgSrc = BLOCK_IMG_BASE + prefix + '_' + Math.min(5, Math.max(1, lv)) + '.png';
                return `<div class="vault-item"><img class="vault-item-icon" src="${imgSrc}" alt="${it.id}"><span class="vault-item-val">Lv.${lv}</span></div>`;
            }).join('');
            const html = heartItem + blocksHtml + goldItem;
            document.querySelectorAll('.vault-bar').forEach((el) => { el.innerHTML = html; });
        } catch (e) { console.warn('updateVaultBar:', e); }
    }

    /* 메인 메뉴 모드 버튼 (맵 위 이미지 버튼 배치) */
    const MAIN_MENU_CONFIG = { bg: 'assets/images/main/bg_main.jpg' };
    window.CHAR_SELECT_CONFIG = { bg: 'assets/images/char_select/bg.jpg' };
    const MAIN_MENU_MODES = [
        { id: 'event', label: '이벤트', image: 'assets/images/main/bt_event.png', pos: { top: 'calc(18% + 150px)', left: 'calc(50% + 50px)', transform: 'translate(-50%, -50%)' } },
        { id: 'goldShop', label: '비밀상점', image: 'assets/images/main/bt_goldshop.png', pos: { top: 'calc(38% + 100px)', left: '22%', transform: 'translate(-50%, -50%)' } },
        { id: 'shop', label: '상점', image: 'assets/images/main/bt_shop.png', pos: { top: '62%', left: 'calc(42% + 50px)', transform: 'translate(-50%, -50%)' } },
        { id: 'dungeon', label: '던전', image: 'assets/images/main/bt_dungeon.png', pos: { top: 'calc(42% + 0px)', left: '78%', transform: 'translate(-50%, -50%)' } },
        { id: 'guild', label: '길드', image: 'assets/images/main/bt_guild.png', pos: { top: 'calc(100% - 700px)', left: 'calc(100% - 200px)', transform: 'translate(-50%, -50%)' } },
        { id: 'record', label: '기록', image: 'assets/images/main/bt_book.png', pos: { top: 'calc(100% - 500px)', left: '150px', transform: 'translate(-50%, -50%)' } },
    ];

    /* 스페셜 에피소드 (베타용 - 제거 시 이 블록 전체 삭제) */
    const SPECIAL_EPISODE_CONFIG = {
        enabled: true,
        charId: 'lily',
        image: 'assets/images/lily/lily_14.png',
        lines: ['♥성인모드♥ 구매시 이용가능합니다.'],
    };

    const mainMenuScreen = document.getElementById('main-menu-screen');
    const mainMenuList = document.getElementById('main-menu-list');
    const listContainer = document.getElementById('char-list-container');
    const menuScreen = document.getElementById('menu-screen');
    const episodeSelectScreen = document.getElementById('episode-select-screen');
    const episodeListContainer = document.getElementById('episode-list-container');
    const episodeSelectTitle = document.getElementById('episode-select-title');
    const episodeBackBtn = document.getElementById('episode-back-btn');
    const dungeonSelectScreen = document.getElementById('dungeon-select-screen');
    const dungeonListContainer = document.getElementById('dungeon-list-container');
    const shopScreen = document.getElementById('shop-screen');
    const goldShopScreen = document.getElementById('gold-shop-screen');
    const guildScreen = document.getElementById('guild-screen');
    const guildBossDetailScreen = document.getElementById('guild-boss-detail-screen');
    const guildBossListWrap = document.querySelector('.guild-boss-list-wrap');
    const shopListContainer = document.getElementById('shop-list-container');

    function hideAllScreens() {
        mainMenuScreen.classList.add('screen-hidden');
        menuScreen.classList.add('screen-hidden');
        episodeSelectScreen.classList.add('screen-hidden');
        dungeonSelectScreen.classList.add('screen-hidden');
        shopScreen.classList.add('screen-hidden');
        goldShopScreen.classList.add('screen-hidden');
        guildScreen.classList.add('screen-hidden');
        guildBossDetailScreen.classList.add('screen-hidden');
        // 상위에서 한 번만: 메뉴/상점/길드 등 어떤 화면으로 가도 시나리오 레이어 숨김 → 터치 정상
        const gc = document.getElementById('game-container');
        if (gc) gc.classList.add('menu-visible');
    }

    const FADE_DUR = 350;
    function fadeOutThen(el, onDone) {
        if (!el || el.classList.contains('screen-hidden')) { if (onDone) onDone(); return; }
        if (el === menuScreen || el === episodeSelectScreen || el === dungeonSelectScreen || el === shopScreen || el === goldShopScreen || el === guildScreen || el === guildBossDetailScreen) {
            clearMemoryGoddessParticles();
        }
        el.classList.add('screen-fade-out');
        el.style.pointerEvents = 'none';
        setTimeout(() => {
            el.classList.remove('screen-fade-out');
            el.style.pointerEvents = '';
            if (onDone) onDone();
        }, FADE_DUR);
    }
    function fadeInScreen(el) {
        if (!el) return;
        el.classList.remove('screen-fade-out');
        el.style.opacity = '0';
        el.offsetHeight; // reflow
        el.style.opacity = '';
    }

    const showMainMenu = window.showMainMenu = function showMainMenu(fromTitle) {
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('touch-mode-btn').style.display = 'none';
        hideDialogueForEpisodeSelect();
        const fromMenu = !menuScreen.classList.contains('screen-hidden');
        const fromDungeon = !dungeonSelectScreen.classList.contains('screen-hidden');
        const leaving = fromMenu ? menuScreen : fromDungeon ? dungeonSelectScreen : null;
        const applyMainMenu = () => {
            hideAllScreens();
            mainMenuScreen.classList.remove('screen-hidden', 'screen-fade-out');
            mainMenuScreen.style.display = 'flex';
            const bgEl = document.getElementById('main-menu-bg');
            const cfg = window.MAIN_MENU_CONFIG || { bg: 'assets/images/main/bg_main.jpg' };
            if (bgEl && cfg.bg) bgEl.style.backgroundImage = `url('${cfg.bg}')`;
            updateVaultBar();
            updateGuildBubble();
            if (fromTitle && mainMenuList) {

    function getDungeonSkillTags(battle) {
        if (!battle) return [];
        const tags = [];
        if (battle.skillFury) tags.push('스킬 광폭화');
        if (battle.shieldAbsorb) tags.push('방패 흡수');
        if (battle.shieldDestroy) tags.push('방패파괴');
        if (battle.ignoreShield) tags.push('방패 무시');
        if (battle.skillChargeReset) tags.push('스킬 0화');
        if (battle.doubleAttack) tags.push('2연타');
        if (battle.spiritBomb) tags.push('정령 폭탄');
        if (battle.healReverse) {
            const n = battle.healReverseTurns ?? 1;
            tags.push(n === 1 ? '물약중독' : `${n}회 물약중독`);
        }
        if (battle.damageReflect) {
            const pct = battle.damageReflectPercent ?? 50;
            const n = battle.damageReflectTurns ?? 1;
            tags.push(n === 1 ? `데미지 반사 ${pct}%` : `${n}회 데미지 반사 ${pct}%`);
        }
        if (battle.absoluteDefense) tags.push('절대 방어');
        if (battle.skillSeal) tags.push('스킬 흡수 방해');
        if (battle.vanishMostBlock) tags.push('소멸');
        if (battle.tileBlock) tags.push('타일 막힘');
        if (battle.blockArea2x2) tags.push('이동 불가 타일');
        if (battle.goldReduce) tags.push('골드 감소');
        const petrifyType = battle.petrifyBlockType || battle.freezeBlockType;
        if (petrifyType === 'POTION') tags.push('물약 석화');
        else if (petrifyType === 'SHIELD') tags.push('방패 석화');
        else if (petrifyType === 'MAGIC') tags.push('마법 석화');
        if (battle.banishBlocks) tags.push('랜덤 블럭 추방');
        return tags;
    }
    // 리스트 버튼 전용. listCharPos 있을 때만 호출됨. 배틀처럼 상단(머리) 기준, 아래쪽은 wrap overflow로 잘림
    function getDungeonBossImgStyle(boss) {
        if (!boss) return '';
        const pos = boss.listCharPos || {};
        if (Object.keys(pos).length === 0) return '';
        const scale = boss.listScale != null ? boss.listScale : 1;
        const parts = [];
        parts.push('position:absolute');
        parts.push('height:auto'); parts.push('width:auto'); parts.push('max-height:none'); parts.push('max-width:none');
        parts.push('transform-origin:top center');
        if (pos.left !== undefined) parts.push(`left:${pos.left}`);
        if (pos.right !== undefined) parts.push(`right:${pos.right}`);
        if (pos.top !== undefined) { parts.push(`top:${pos.top}`); parts.push('bottom:auto'); }
        if (pos.bottom !== undefined) { parts.push(`bottom:${pos.bottom}`); parts.push('top:auto'); }

        parts.push(`transform:${baseTx} scale(${scale})`);

            audio.volume = 1;
            const done = () => { if (_currentStoreVoice === audio) { _currentStoreVoice = null; _currentStoreVoiceOnEnded = null; } if (onEnded) onEnded(); };
            audio.onended = done;
            audio.onerror = done;

        let data = scenarios[scenarioKey] || def;

        const path = data.image ? (data.image.includes('/') ? data.image : `assets/images/maya/${data.image}.png`) : '';
        const fullPath = path ? (path.startsWith('/') || path.includes('://') ? path : `./${path}`) : '';

            if (!charEl || !charNext || !imgPath) return;
            const p = imgPath.includes('/') ? imgPath : `assets/images/maya/${imgPath}.png`;
            const fp = p.startsWith('/') || p.includes('://') ? p : './' + p;
            const cur = parseFloat(charEl.style.opacity || 0) > 0 ? charEl : charNext;
            const nxt = cur === charEl ? charNext : charEl;
            if (cur.src && cur.src.includes((p.split('/').pop() || ''))) return;
            nxt.style.opacity = '0';

            nxt.src = fp;
            nxt.onerror = function() { this.src = 'assets/images/maya/maya_01.png'; };
            await new Promise(r => {
                if (nxt.complete && nxt.naturalWidth) return r();

    function onGoldShopCharTouch(e) {

            goldShopState._lastTouchSnd = now;

        }
        const touch = e.touches ? e.touches[0] : e;
        const rect = document.getElementById('gold-shop-screen')?.getBoundingClientRect();
        const scale = window.gameEngine?.currentScale || 1;
        if (rect) {
            const x = (touch.clientX - rect.left) / scale;
            const y = (touch.clientY - rect.top) / scale;
            const layer = document.getElementById('gold-shop-particle-layer');
            if (layer) {
                for (let i = 0; i < 7; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.innerText = '♥';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 70 + Math.random() * 120;
                    const tx = Math.cos(angle) * dist;
                    const ty = Math.sin(angle) * dist - 30;
                    const tr = -60 + Math.random() * 120;
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.setProperty('--tw-x', `${tx}px`);
                    particle.style.setProperty('--tw-y', `${ty}px`);
                    particle.style.setProperty('--tw-r', `${tr}deg`);
                    layer.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }

        }

    function onGuildCharTouch(e) {
        if (guildState.isLeaving) return;
        e.preventDefault();
        e.stopPropagation();
        const now = Date.now();
        if (!guildState._lastTouchSnd || now - guildState._lastTouchSnd > 120) {
            guildState._lastTouchSnd = now;
            if (window.gameEngine) window.gameEngine.playSound('touch');
        }
        const touch = e.touches ? e.touches[0] : e;
        const rect = document.getElementById('guild-screen')?.getBoundingClientRect();
        const scale = window.gameEngine?.currentScale || 1;
        if (rect) {
            const x = (touch.clientX - rect.left) / scale;
            const y = (touch.clientY - rect.top) / scale;
            const layer = document.getElementById('guild-particle-layer');
            if (layer) {
                for (let i = 0; i < 7; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.innerText = '♥';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 70 + Math.random() * 120;
                    const tx = Math.cos(angle) * dist;
                    const ty = Math.sin(angle) * dist - 30;
                    const tr = -60 + Math.random() * 120;
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.setProperty('--tw-x', `${tx}px`);
                    particle.style.setProperty('--tw-y', `${ty}px`);
                    particle.style.setProperty('--tw-r', `${tr}deg`);
                    layer.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }
        const wrap = document.querySelector('#guild-screen .shop-char-img-wrap');
        if (wrap && !guildState.isShaking) {
            guildState.isShaking = true;
            wrap.classList.add('shop-char-shake');
            wrap.addEventListener('animationend', function onEnd() {
                wrap.removeEventListener('animationend', onEnd);
                wrap.classList.remove('shop-char-shake');
                guildState.isShaking = false;
            }, { once: true });
        }
        guildState.touchCount++;
        if (guildState.touchCount === 3) {
            setGuildChar('touchReaction');
            guildState.scenarioTimeout = setTimeout(() => { setGuildChar('default'); guildState.touchCount = 0; }, 3000);
        }
    }

    function buildGuildBossReportHtml(report, bossImg, boss) {
        if (!report) {
            return `<p style="color:#888;">(정보 준비 중)</p>`;
        }
        const esc = (s) => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        const fmt = (text) => {
            if (!text) return '';
            return esc(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        };
        const imgHtml = bossImg ? `<div class="guild-report-boss-img-wrap"><img src="${esc(bossImg)}" alt="${esc(report.name || boss.name)}" draggable="false"></div>` : '';
        let body = '';
        body += `<div class="guild-report-header">[ 던전 조사 보고서 #${String(report.reportNo || '').padStart(2, '0')} ]</div>`;
        body += `<div class="guild-report-section"><div class="guild-report-section-title">1. 개체명 (Name)</div><div class="guild-report-text">공식 명칭: ${fmt(report.name)}</div>${report.alias ? `<div class="guild-report-text">모험가들 사이의 별칭: ${fmt(report.alias)}</div>` : ''}</div>`;
        if (report.dangerLevel) body += `<div class="guild-report-section"><div class="guild-report-section-title">2. 위험 등급 (Danger Level)</div><div class="guild-report-text guild-report-danger">${fmt(report.dangerLevel)}</div></div>`;
        if (report.ecology) body += `<div class="guild-report-section"><div class="guild-report-section-title">3. 생태 분석 (Ecology)</div><div class="guild-report-text">${fmt(report.ecology)}</div></div>`;
        if (report.disposition) body += `<div class="guild-report-section"><div class="guild-report-section-title">4. 성향 및 성격 (Disposition)</div><div class="guild-report-text">${fmt(report.disposition)}</div></div>`;
        if (report.combat) body += `<div class="guild-report-section"><div class="guild-report-section-title">5. 전투 특징 (Combat Intelligence)</div><div class="guild-report-text">${fmt(report.combat)}</div></div>`;
        if (report.adventurerNote) body += `<div class="guild-report-section"><div class="guild-report-section-title">6. 모험가의 조언 (Adventurer's Note)</div><div class="guild-report-text guild-report-note">${fmt(report.adventurerNote)}</div></div>`;
        return `<div class="guild-report">${imgHtml}<div class="guild-report-body">${body}</div></div>`;
    }

    function renderGoldShopProducts() {
        const container = document.getElementById('gold-shop-products');
        if (!container) return;
        container.innerHTML = '';
        const items = window.GOLD_SHOP_ITEMS || goldShopItems || [];
        const state = (window.gameStorage && window.gameStorage.getState()) || getVaultState();
        const hp = Math.max(5, state.playerMaxHp || 10);
        const MIN_HP = 5;
        items.forEach((item) => {
            const price = item.price || 0;
            const canAfford = hp >= price && (hp - price) >= MIN_HP;
            const btn = document.createElement('button');
            btn.className = 'shop-product-btn' + (!canAfford ? ' max' : '');
            btn.innerHTML = `<div class="shop-product-icon">${item.icon || '🎁'}</div><div class="shop-product-name">${item.name || item.id}</div><div class="shop-product-price">${price}HP</div>`;
            if (canAfford) {
                btn.onclick = () => {
                    window.gameEngine.playSound('click');
                    if (hp < price || (hp - price) < MIN_HP) {
                        window.gameEngine.showAlertModal('비밀 상점', `체력이 부족합니다. (필요: ${price}HP, 최소 ${MIN_HP}HP 유지)`, () => {
                            clearGoldShopScenarioTimeout();
                            setGoldShopChar('insufficientHp');
                            goldShopState.scenarioTimeout = setTimeout(() => setGoldShopChar('default'), 3000);
                        });
                        return;
                    }
                    const min = item.goldRewardMin ?? item.goldReward ?? 0;
                    const max = item.goldRewardMax ?? item.goldReward ?? 0;
                    window.gameEngine.showSecretShopExchangeModal(price, min, max, () => {
                        const goldReward = (min > 0 || max > 0)
                            ? (() => { const lo = Math.min(min, max); const hi = Math.max(min, max); const steps = Math.floor((hi - lo) / 100) + 1; return lo + 100 * Math.floor(Math.random() * steps); })()
                            : 0;
                        if (window.gameStorage && window.gameStorage.secretShopPurchase) {
                            window.gameStorage.secretShopPurchase(price, goldReward);
                        } else if (window.gameStorage && window.gameStorage.subtractPlayerMaxHp) {
                            window.gameStorage.subtractPlayerMaxHp(price);
                            if (goldReward > 0) window.gameStorage.addGoldEarned(goldReward);
                        } else {
                            try {
                                const KEY = '3x3_vault';
                                const s = localStorage.getItem(KEY);
                                const parsed = s ? JSON.parse(s) : {};
                                const cur = Math.max(5, Number(parsed.playerMaxHp) || 10);
                                parsed.playerMaxHp = Math.max(MIN_HP, cur - price);
                                parsed.goldEarned = (Number(parsed.goldEarned) || 0) + goldReward;
                                parsed.goldUsed = Number(parsed.goldUsed) || 0;
                                parsed.blockLevels = parsed.blockLevels || { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 };
                                parsed.heartPurchaseCount = Number(parsed.heartPurchaseCount) || 0;
                                localStorage.setItem(KEY, JSON.stringify(parsed));
                            } catch (e) {}
                        }
                        updateVaultBar();
                        renderGoldShopProducts();
                        onGoldShopPurchased();
                    });
                };
            } else {
                btn.onclick = () => {
                    window.gameEngine.playSound('click');
                    clearGoldShopScenarioTimeout();
                    setGoldShopChar('insufficientHp');
                    goldShopState.scenarioTimeout = setTimeout(() => setGoldShopChar('default'), 3000);
                };
            }
            container.appendChild(btn);
        });
    }

    function resolveAssetUrl(p) {
        if (!p || typeof p !== 'string') return '';
        if (p.startsWith('data:') || p.includes('://')) return p;
        const fixed = p.replace(/^\.\.\/\.\.\/assets\//, 'assets/');
        try { return new URL(fixed, window.location.href).href; } catch (e) { return fixed; }
    }
    function addGoldUsedDirect(amount) {
        try {
            const KEY = '3x3_vault';
            const s = localStorage.getItem(KEY);
            const parsed = s ? JSON.parse(s) : {};
            parsed.goldUsed = (Number(parsed.goldUsed) || 0) + (Number(amount) || 0);
            localStorage.setItem(KEY, JSON.stringify(parsed));
        } catch (e) {}
    }
    function addPlayerHpDirect(amount) {
        try {
            const KEY = '3x3_vault';
            const s = localStorage.getItem(KEY);
            const parsed = s ? JSON.parse(s) : {};
            parsed.playerMaxHp = Math.max(5, (Number(parsed.playerMaxHp) || 10) + (Number(amount) || 0));
            localStorage.setItem(KEY, JSON.stringify(parsed));
        } catch (e) {}
    }
    function addHeartPurchaseCountDirect() {
        try {
            const KEY = '3x3_vault';
            const s = localStorage.getItem(KEY);
            const parsed = s ? JSON.parse(s) : {};
            parsed.heartPurchaseCount = (Number(parsed.heartPurchaseCount) || 0) + 1;
            localStorage.setItem(KEY, JSON.stringify(parsed));
        } catch (e) {}
    }
    function getShopPrice(item, state) {
        const base = item.basePrice || 50;
        if (item.id === 'HEART') {
            const cnt = state.heartPurchaseCount || 0;
            return base * Math.pow(2, cnt);
        }
        const lv = (state.blockLevels && state.blockLevels[item.id]) ?? 1;
        if (lv >= (item.maxLevel || 5)) return null;
        return base * Math.pow(2, lv - 1);
    }
    function renderShopProducts() {
        const container = document.getElementById('shop-products');
        if (!container) return;
        container.innerHTML = '';
        const items = window.SHOP_ITEMS || shopItems || [];
        const state = (window.gameStorage && window.gameStorage.getState()) || getVaultState();
        const gold = Math.max(0, (state.goldEarned || 0) - (state.goldUsed || 0));
        items.forEach((item) => {
            const isHeart = item.id === 'HEART';
            const curVal = isHeart ? (state.playerMaxHp || 10) : ((state.blockLevels && state.blockLevels[item.id]) ?? 1);
            const maxVal = isHeart ? (item.maxHp || 99) : (item.maxLevel || 5);
            const price = getShopPrice(item, state);
            const isMax = curVal >= maxVal || price === null;
            const btn = document.createElement('button');
            btn.className = 'shop-product-btn' + (isMax ? ' max' : '');
            const prefix = ['SWORD','POTION','SHIELD','MAGIC'].includes(item.id) ? item.id.toLowerCase() : null;
            const iconHtml = prefix
                ? `<img class="shop-product-icon-img" src="${BLOCK_IMG_BASE}${prefix}_${Math.min(5,Math.max(1, isMax ? curVal : curVal + 1))}.png" alt="${item.id}">`
                : `<span class="shop-product-icon">${item.icon}</span>`;
            const priceText = isMax ? 'MAX' : `${price}G`;
            btn.innerHTML = `<div class="shop-product-icon-wrap">${iconHtml}</div><div class="shop-product-name">${item.name || item.id}</div><div class="shop-product-price">${priceText}</div>`;
            if (!isMax) {
                btn.onclick = () => {
                    window.gameEngine.playSound('click');
                    if (gold < price) {
                        window.gameEngine.showAlertModal('상점', `골드가 부족합니다. (필요: ${price}G)`, () => {
                            clearShopScenarioTimeout();
                            setShopChar('insufficientGold');
                            shopState.scenarioTimeout = setTimeout(() => setShopChar('default'), 3000);
                        });
                        return;
                    }
                    const modalBody = isHeart ? `체력 +${item.perPurchase || 5} (${price}G)` : `${item.name} Lv.${Math.min(5, ((state.blockLevels && state.blockLevels[item.id]) ?? 1) + 1)} (${price}G)`;
                    const nextLv = isHeart ? null : Math.min(5, ((state.blockLevels && state.blockLevels[item.id]) ?? 1) + 1);
                    const prefix = !isHeart && ['SWORD','POTION','SHIELD','MAGIC'].includes(item.id) ? item.id.toLowerCase() : null;
                    const iconUrl = prefix ? `${BLOCK_IMG_BASE}${prefix}_${nextLv}.png` : null;
                    window.gameEngine.showConfirmModal('구매 확인', modalBody, () => {
                        if (window.gameStorage && window.gameStorage.addGoldUsed) window.gameStorage.addGoldUsed(price);
                        else addGoldUsedDirect(price);
                        if (isHeart) {
                            const add = item.perPurchase || 5;
                            if (window.gameStorage && window.gameStorage.addPlayerMaxHp) window.gameStorage.addPlayerMaxHp(add);
                            else addPlayerHpDirect(add);
                            if (window.gameStorage && window.gameStorage.addHeartPurchaseCount) window.gameStorage.addHeartPurchaseCount();
                            else addHeartPurchaseCountDirect();
                        } else {
                            const lv = (state.blockLevels && state.blockLevels[item.id]) ?? 1;
                            const newLv = Math.min(5, lv + 1);
                            if (window.gameStorage && window.gameStorage.setBlockLevel) window.gameStorage.setBlockLevel(item.id, newLv);
                            else {
                                try {
                                    const KEY = '3x3_vault';
                                    const s = localStorage.getItem(KEY);
                                    const parsed = s ? JSON.parse(s) : {};
                                    parsed.blockLevels = parsed.blockLevels || { SWORD: 1, POTION: 1, SHIELD: 1, MAGIC: 1 };
                                    parsed.blockLevels[item.id] = newLv;
                                    parsed.goldEarned = Number(parsed.goldEarned) || 0;
                                    parsed.goldUsed = Number(parsed.goldUsed) || 0;
                                    parsed.playerMaxHp = Math.max(5, Number(parsed.playerMaxHp) || 10);
                                    parsed.heartPurchaseCount = Number(parsed.heartPurchaseCount) || 0;
                                    localStorage.setItem(KEY, JSON.stringify(parsed));
                                } catch (e) {}
                            }
                        }
                        updateVaultBar();
                        renderShopProducts();
                        onShopPurchased();
                    }, iconUrl ? { iconUrl } : undefined);
                };
            } else {
                btn.disabled = true;
            }
            container.appendChild(btn);
        });
    }

    function hasUnclaimedGuildRewards() {
        const defeated = getGuildBossDefeated();
        const claimed = getGuildBossRewardClaimed();
        return defeated.some(id => !claimed.includes(id));
    }

    function updateGuildBubble() {
        const guildBtn = document.querySelector('.main-menu-map-btn[data-mode="guild"]');
        if (!guildBtn) return;
        let bubble = guildBtn.querySelector('.guild-reward-bubble');
        const hasUnclaimed = hasUnclaimedGuildRewards();
        if (hasUnclaimed) {
            if (!bubble) {
                bubble = document.createElement('span');
                bubble.className = 'guild-reward-bubble';
                bubble.textContent = '토벌완료';
                guildBtn.appendChild(bubble);
            }
            bubble.style.display = '';
        } else if (bubble) {
            bubble.style.display = 'none';
        }
    }

    function buildMainMenu() {
        mainMenuList.innerHTML = '';
        MAIN_MENU_MODES.forEach((mode) => {
            const btn = document.createElement('button');
            btn.className = 'main-menu-map-btn';
            btn.dataset.mode = mode.id;
            const p = mode.pos || {};
            btn.style.top = p.top || '50%';
            btn.style.left = p.left || '50%';
            const img = mode.image || '';
            const label = mode.label || mode.id;
            btn.innerHTML = img
                ? `<img src="${img}" alt="${mode.id}" class="main-menu-map-btn-img"><span class="main-menu-map-btn-label">${label}</span>`
                : '';
            btn.onclick = () => {
                window.gameEngine.playSound('click');
                if (mode.id === 'event') showCharacterSelect();
                else if (mode.id === 'dungeon') showDungeon();
                else if (mode.id === 'shop') showShop();
                else if (mode.id === 'goldShop') showGoldShop();
                else if (mode.id === 'guild') showGuild();
                else if (mode.id === 'record') {
                    window.gameEngine.showAlertModal('마법기록관', '(공사중)\n아스테리아의 모든 정보를 열람할 수 있는 곳입니다.', () => {});
                }
            };
            mainMenuList.appendChild(btn);
        });
        if (!mainMenuList.dataset.touchBound) {
            mainMenuList.dataset.touchBound = '1';
            mainMenuList.addEventListener('touchstart', function(e) {
                const btn = e.target.closest('.main-menu-map-btn');
                if (btn && btn.onclick) {
                    e.preventDefault();
                    btn.onclick();
                }
            }, { passive: false });
        }
    }

    function hideDialogueForEpisodeSelect() {
        const ui = document.getElementById('ui-layer');
        if (!ui) return;
        ui.style.transition = 'none';
        ui.classList.add('ui-hidden');
        ui.classList.remove('ui-shown', 'hidden');
        ui.style.display = 'none';
    }

    function showEpisodeSelect(char, fromGame = false) {
        clearMemoryGoddessParticles();
        const episodeList = window.gameEngine.getEpisodeList(char.data);
        const cleared = window.gameEngine.getClearedEpisodes(char.id);

        hideDialogueForEpisodeSelect();
                menuScreen.style.display = 'none';
        episodeSelectScreen.classList.remove('screen-hidden');
        episodeSelectScreen.classList.remove('screen-visible');
        episodeSelectTitle.textContent = `${char.name} - EPISODE SELECT`;

        episodeListContainer.innerHTML = '';
        if (!fromGame && episodeList.length === 0) {
            startGame(char, -1);
            return;
        }
        if (!fromGame && episodeList.length === 1) {
            startGame(char, episodeList[0].index);
            return;
        }

        if (!fromGame) {
            requestAnimationFrame(() => episodeSelectScreen.classList.add('screen-visible'));
        }
        episodeList.forEach((ep, i) => {
            const unlocked = i === 0 || cleared.includes(i - 1);
            const btn = document.createElement('button');
            btn.className = 'episode-btn' + (unlocked ? '' : ' locked');
            if (ep.image) btn.style.backgroundImage = `url('${ep.image}')`;
            const fullTitle = (ep.title || '').trim();
            const firstLine = fullTitle.split(/\n\n+/)[0]?.replace(/^-\s*|\s*-$/g, '').trim() || '';
            const epNum = /Epilogue/i.test(firstLine) ? 'Epilogue' : `Episode ${i + 1}`;
            const storyTitle = fullTitle.split(/\n\n+/).pop()?.trim() || `에피소드 ${i + 1}`;
            btn.innerHTML = `<div class="episode-btn-overlay"></div><div class="episode-btn-text"><span class="ep-num">${epNum}</span><span class="ep-title">${storyTitle}</span></div>`;
            if (unlocked) {
                btn.onclick = () => {
                    window.gameEngine.playSound('click');
                    episodeSelectScreen.classList.add('screen-hidden');
                    const ui = document.getElementById('ui-layer');
                    ui.style.transition = 'none';
                    ui.classList.add('ui-hidden');
                    ui.classList.remove('ui-shown', 'hidden');
                    ui.style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';
                document.getElementById('touch-mode-btn').style.display = 'block';
                    requestAnimationFrame(() => {
                        ui.style.transition = '';
                        window.gameEngine.init(char.data, ep.index);
                    });
                };
            }
            episodeListContainer.appendChild(btn);
        });

        const goddessGiftArea = document.getElementById('goddess-gift-area');
        if (goddessGiftArea) {
            goddessGiftArea.innerHTML = '';
            const lilyEpilogueCleared = char.id === 'lily' && episodeList.length > 0 && window.gameEngine.getClearedEpisodes('lily').includes(episodeList.length - 1);
            if (lilyEpilogueCleared) {
                const giftBtn = document.createElement('button');
                giftBtn.className = 'episode-btn episode-btn--goddess-gift';
                giftBtn.style.backgroundImage = "url('assets/images/memory/bg_3.jpg')";
                giftBtn.innerHTML = `<div class="episode-btn-overlay"></div><div class="episode-btn-content"><div class="episode-btn-text"><span class="ep-num">여신의 선물</span><span class="ep-title">기다림의 증표</span></div><img class="episode-btn-pendant" src="assets/images/memory/lily_item.png" alt="할머니의 펜던트"></div>`;
                giftBtn.onclick = () => {
                window.gameEngine.playSound('click');
                    window._goddessGiftReturnChar = char;
                    episodeSelectScreen.classList.add('screen-hidden');
                    const ui = document.getElementById('ui-layer');
                    ui.style.transition = 'none';
                    ui.classList.add('ui-hidden');
                    ui.classList.remove('ui-shown', 'hidden');
                    ui.style.display = 'block';
                    document.getElementById('back-btn').style.display = 'block';
                    document.getElementById('touch-mode-btn').style.display = 'none';
                    requestAnimationFrame(() => {
                        ui.style.transition = '';
                        window.gameEngine.init(lilyGoddessGiftData, 0);
                    });
                };
                goddessGiftArea.appendChild(giftBtn);
            }
        }

        if (SPECIAL_EPISODE_CONFIG.enabled && char.id === SPECIAL_EPISODE_CONFIG.charId) {
            const area = document.getElementById('special-episode-area');
            area.innerHTML = '';
            const allCleared = episodeList.length > 0 && window.gameEngine.getClearedEpisodes(char.id).includes(episodeList.length - 1);
            const spBtn = document.createElement('button');
            spBtn.className = 'episode-btn episode-btn--special' + (allCleared ? '' : ' locked');
            spBtn.innerHTML = `<div class="episode-btn-overlay"></div><div class="episode-btn-text"><span class="ep-num">Special Episode</span><span class="ep-title">♥성인모드♥</span></div>`;
            if (allCleared) {
                spBtn.onclick = () => {
                    window.gameEngine.playSound('click');
                    const overlay = document.getElementById('special-episode-overlay');
                    const img = document.getElementById('special-episode-img');
                    const lines = document.getElementById('special-episode-lines');
                    img.src = SPECIAL_EPISODE_CONFIG.image;
                    lines.innerHTML = SPECIAL_EPISODE_CONFIG.lines.map(l => `<div>${l}</div>`).join('');
                    overlay.classList.remove('hidden');
                };
            }
            area.appendChild(spBtn);
        } else {
            document.getElementById('special-episode-area').innerHTML = '';
        }
    }

    function closeSpecialEpisode() {
        const overlay = document.getElementById('special-episode-overlay');
        if (overlay && !overlay.classList.contains('hidden')) {
            window.gameEngine.playSound('click');
            overlay.classList.add('hidden');
        }
    }

    function startGame(char, startIndex) {
        hideAllScreens();
        const gc = document.getElementById('game-container');
        if (gc) gc.classList.remove('menu-visible');
        const ui = document.getElementById('ui-layer');
        ui.style.transition = 'none';
        ui.classList.add('ui-hidden');
        ui.classList.remove('ui-shown', 'hidden');
        ui.style.display = 'block';
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('touch-mode-btn').style.display = 'block';
        requestAnimationFrame(() => {
            ui.style.transition = '';
            window.gameEngine.init(char.data, startIndex);
        });
    }

    function bindStoreBtnTouch(el, handler) {
        if (!el) return;
        el.onclick = handler;
        el.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handler();
        }, { passive: false });
    }
    bindStoreBtnTouch(document.getElementById('back-btn'), () => {
        if (window.gameEngine) window.gameEngine.returnToMenu();
    });
    bindStoreBtnTouch(document.getElementById('menu-back-btn'), () => {
        window.gameEngine.playSound('click');
        showMainMenu();
    });
    bindStoreBtnTouch(document.getElementById('episode-back-btn'), () => {
        window.gameEngine.playSound('click');
        hideDialogueForEpisodeSelect();
        hideAllScreens();
        menuScreen.classList.remove('screen-hidden');
        menuScreen.style.display = 'flex';
        buildCharList();
        if (listContainer) listContainer.scrollTop = 0;
    });
    bindStoreBtnTouch(document.getElementById('dungeon-back-btn'), () => {
        window.gameEngine.playSound('click');
        showMainMenu();
    });
    bindStoreBtnTouch(document.getElementById('dungeon-intro-btn'), () => {
        window.gameEngine.playSound('click');
        fadeOutThen(dungeonSelectScreen, () => startGoldDungeonIntro());
    });
    bindStoreBtnTouch(document.getElementById('shop-intro-btn'), () => {
        window.gameEngine.playSound('click');
        fadeOutThen(shopScreen, () => startShopIntro());
    });
    bindStoreBtnTouch(document.getElementById('shop-back-btn'), () => {
        if (shopState.isLeaving) return;
        window.gameEngine.playSound('click');
        shopState.isLeaving = true;
        clearShopScenarioTimeout();
        stopStoreVoice();
        shopState.voiceSkipCallback = null;
        shopState._settingChar = false;
        shopState._pendingChar = null;
        if (!shopState.hasPurchased) {
            setShopChar('leaveNoPurchase', exitShop);
        } else {
            setShopChar('leaveAfterPurchase', exitShop);
        }
    });
    bindStoreBtnTouch(document.getElementById('gold-shop-intro-btn'), () => {
        window.gameEngine.playSound('click');
        fadeOutThen(goldShopScreen, () => startGoldShopIntro());
    });
    bindStoreBtnTouch(document.getElementById('gold-shop-back-btn'), () => {
        if (goldShopState.isLeaving) return;
        window.gameEngine.playSound('click');
        goldShopState.isLeaving = true;
        clearGoldShopScenarioTimeout();
        stopStoreVoice();
        goldShopState.voiceSkipCallback = null;
        goldShopState._settingChar = false;
        goldShopState._pendingChar = null;
        if (!goldShopState.hasPurchased) {
            setGoldShopChar('leaveNoPurchase', exitGoldShop);
        } else {
            setGoldShopChar('leaveAfterPurchase', exitGoldShop);
        }
    });

    [document.getElementById('shop-products'), document.getElementById('gold-shop-products')].forEach(function(container) {
        if (!container) return;
        container.addEventListener('touchstart', function(e) {
            const btn = e.target.closest('.shop-product-btn');
            if (btn && !btn.disabled && btn.onclick) {
                e.preventDefault();
                btn.onclick();
            }
        }, { passive: false });
    });
    function bindGuildBtnTouch(el, handler) {
        if (!el) return;
        el.onclick = handler;
        el.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handler();
        }, { passive: false });
    }
    bindGuildBtnTouch(document.getElementById('guild-intro-btn'), () => {
        window.gameEngine.playSound('click');
        const gc = document.getElementById('game-container');
        if (gc) gc.classList.remove('guild-main-visible');
        fadeOutThen(guildScreen, () => startGuildIntro());
    });
    bindGuildBtnTouch(document.getElementById('guild-back-btn'), () => {
        window.gameEngine.playSound('click');
        if (guildState.isLeaving) return;
        guildState.isLeaving = true;
        stopStoreVoice();
        clearGuildScenarioTimeout();
        guildState.voiceSkipCallback = null;
        guildState._settingChar = false;
        guildState._pendingChar = null;
        setGuildChar('leave', exitGuild);
    });

    bindStoreBtnTouch(document.getElementById('guild-boss-detail-back-btn'), () => {
        window.gameEngine.playSound('click');
        guildBossDetailScreen.classList.add('screen-hidden');
        guildScreen.classList.remove('screen-hidden');
        guildScreen.style.display = 'flex';
    });

    if (guildBossListWrap) {
        guildBossListWrap.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                guildBossListWrap.scrollLeft += e.deltaY;
            }
        }, { passive: false });
    }
    const guildBossList = document.getElementById('guild-boss-list');
    if (guildBossList) {
        guildBossList.addEventListener('touchstart', function(e) {
            const card = e.target.closest('.guild-boss-card');
            if (card && card.onclick) {
                e.preventDefault();
                card.onclick();
            }
        }, { passive: false });
    }

    function getClearedEpisodes(charId) {
        try {
            const raw = localStorage.getItem(`episodeClear_${charId}`);
            if (!raw) return [];
            return JSON.parse(raw);
        } catch { return []; }
    }

    function isLilyEpilogueCleared() {
        const engine = window.gameEngine;
        if (!engine || !lilyData?.events) return false;
        const episodeList = engine.getEpisodeList(lilyData);
        if (!episodeList || episodeList.length === 0) return false;
        const lastEpIdx = episodeList.length - 1;
        return getClearedEpisodes('lily').includes(lastEpIdx);
    }

    function buildCharList() {
        if (!listContainer) return;
        listContainer.innerHTML = '';
        const memoryChar = { id: 'memory', name: '인연의 기억', title: '프롤로그', image: 'assets/images/memory/godness_icon.png', data: memoryData };
        const memoryCard = document.createElement('div');
        memoryCard.className = 'char-card char-card--memory';
        memoryCard.innerHTML = `<img class="char-thumb" src="${resolveAssetUrl(memoryChar.image)}"><div class="char-info"><div class="char-name">${memoryChar.name}</div><div class="char-desc">${memoryChar.title}</div></div>`;
        memoryCard.onclick = () => {
            window.gameEngine.playSound('click');
            startMemoryIntro();
        };
        listContainer.appendChild(memoryCard);

        const prologueCleared = hasSeenMemoryIntro();
        const lilyEpilogueCleared = isLilyEpilogueCleared();
        const charsToShow = !prologueCleared ? [] : (lilyEpilogueCleared ? characterList : characterList.filter(c => c.id === 'lily'));

        charsToShow.forEach(char => {
        const card = document.createElement('div');
            card.className = 'char-card' + (char.id === 'lily' ? ' char-card--lily' : '');
        const imgSrc = char.image ? char.image : 'https://placehold.co/100x100/333/FFF?text=?';
            const betaBadge = char.id === 'lily' ? '<span class="char-badge char-badge--beta">베타</span>' : '';
            card.innerHTML = `<img class="char-thumb" src="${imgSrc}"><div class="char-info"><div class="char-name">${char.name}</div><div class="char-desc">${char.title}</div></div>${betaBadge}`;
        card.onclick = () => {
            if (char.data) {
                window.gameEngine.playSound('click');
                    showEpisodeSelect(char);
                } else window.gameEngine.showAlertModal("", "준비 중입니다.");
        };
        listContainer.appendChild(card);
    });
    }

    window.gameEngine = new GameEngine();
    window.showCharacterSelectFromMemory = showCharacterSelectFromMemory;
    window.showEpisodeSelect = showEpisodeSelect;
    window.spawnMemoryGoddessParticles = spawnMemoryGoddessParticles;
    window.clearMemoryGoddessParticles = clearMemoryGoddessParticles;

    window.showEpisodeSelectFromGame = function() {
        const engine = window.gameEngine;
        if (!engine?.data) return;
        const gc = document.getElementById('game-container');
        if (gc) gc.classList.add('menu-visible');
        const char = {
            id: engine.data.id,
            name: engine.data.name,
            data: engine.data
        };
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('touch-mode-btn').style.display = 'none';
        showEpisodeSelect(char, true);
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                episodeSelectScreen.classList.add('screen-visible');
            });
        });
    };

    (function initSpecialEpisodeOverlay() {
        if (!SPECIAL_EPISODE_CONFIG.enabled) return;
        const overlay = document.getElementById('special-episode-overlay');
        if (!overlay) return;
        overlay.addEventListener('click', closeSpecialEpisode);
        overlay.addEventListener('touchstart', (e) => { e.preventDefault(); closeSpecialEpisode(); }, { passive: false });
    })();

    buildMainMenu();
    updateVaultBar();
    updateGuildBubble();

    (function initModalTouch() {
        const modal = document.getElementById('game-modal');
        if (!modal) return;
        modal.addEventListener('touchstart', function(e) {
            const btn = e.target.closest('button');
            if (btn && modal.contains(btn)) {
                e.preventDefault();
                btn.click();
            }
        }, { passive: false });
    })();

    (function initListTouchDelegation() {
        function delegateTouch(container, selector) {
            if (!container) return;
            container.addEventListener('touchstart', function(e) {
                const el = e.target.closest(selector);
                if (el && container.contains(el)) {
                    e.preventDefault();
                    if (el.onclick) el.onclick();
                    else if (el.click) el.click();
                }
            }, { passive: false });
        }
        delegateTouch(document.getElementById('char-list-container'), '.char-card');
        delegateTouch(document.getElementById('dungeon-list-container'), '.dungeon-episode-btn');
        delegateTouch(document.getElementById('episode-list-container'), '.episode-btn');
    })();

    (function initTitleShimmer() {
        const logo = document.getElementById('title-screen-logo');
        const shimmer = document.querySelector('.title-screen-logo-shimmer');
        if (!logo || !shimmer) return;
        const applyMask = () => {
            if (logo.src) {
                shimmer.style.webkitMaskImage = 'url("' + logo.src + '")';
                shimmer.style.maskImage = 'url("' + logo.src + '")';
            }
        };
        if (logo.complete) applyMask();
        else logo.addEventListener('load', applyMask);
    })();

    (function initTitleScreen() {
        const titleScreen = document.getElementById('title-screen');
        if (!titleScreen) return;
        let done = false;
        const toModeSelect = () => {
            if (done) return;
            done = true;
            const textEl = titleScreen.querySelector('.title-screen-text');
            if (textEl) textEl.style.display = 'none';
            titleScreen.style.pointerEvents = 'none';
            titleScreen.classList.add('title-zooming');
            setTimeout(() => {
                titleScreen.classList.add('title-fade-out');
                showMainMenu(true);
                const mainMenuScreen = document.getElementById('main-menu-screen');
                if (mainMenuScreen) fadeInScreen(mainMenuScreen);
                setTimeout(() => {
                    titleScreen.style.display = 'none';
                    titleScreen.classList.remove('title-fade-out');
                }, 550);
            }, 1200);
        };
        titleScreen.addEventListener('click', toModeSelect);
        titleScreen.addEventListener('touchstart', (e) => { e.preventDefault(); toModeSelect(); }, { passive: false });
    })();

    window.showDungeonAfterBattle = function() {
        window.showDungeonList();
    };
</script>
</body>
</html>
